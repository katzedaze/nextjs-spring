spring:
  application:
    name: todo-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/todoapp}
    username: ${SPRING_DATASOURCE_USERNAME:todoapp}
    password: ${SPRING_DATASOURCE_PASSWORD:todoapp}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-please-change-me-to-a-long-random-string-at-least-32-bytes}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
