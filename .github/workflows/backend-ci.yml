name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint + test + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -x ./gradlew ]; then
            gradle wrapper --gradle-version 8.10
          fi

      - name: Spotless check
        run: ./gradlew spotlessCheck --stacktrace

      - name: Test (JUnit + Testcontainers)
        run: ./gradlew test jacocoTestReport --stacktrace
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Coverage verification
        run: ./gradlew jacocoTestCoverageVerification --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/build/reports/tests/test
            backend/build/reports/jacoco
          retention-days: 14
